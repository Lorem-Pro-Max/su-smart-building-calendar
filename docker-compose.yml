volumes:
  booking_frontend_dist:

services:
  booking-frontend:
    build:
      context: ./client
      args:
        - VITE_API_BASE=${VITE_API_BASE}
    volumes:
      - booking_frontend_dist:/shared-assets
    command: sh -c "cp -rv /app/dist/. /shared-assets/"

  booking-backend:
    build: ./server
    restart: always
    ports:
      - "8112:8112"
    environment:
      - PORT=${PORT}
      - DATABASE_URL=${DATABASE_URL}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  booking-nginx:
    image: nginx:stable-alpine
    ports:
      - "7190:80"
    volumes:
      - ./nginx/gateway.conf:/etc/nginx/conf.d/default.conf:ro
      - booking_frontend_dist:/usr/share/nginx/html/booking-calendar:ro
    depends_on:
      - booking-backend
    restart: always
